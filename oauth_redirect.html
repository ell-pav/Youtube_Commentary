<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>OAuth Redirect</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js" onload="initSupabase()"></script>
</head>
<body>
  <p>🔄 Connexion en cours...</p>
  <script>
    const SUPABASE_URL = "https://vtipznwmrqdjhxruqzxa.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0aXB6bndtcnFkamh4cnVxenhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg2MzMxMDQsImV4cCI6MjA3NDIwOTEwNH0.wKON1rZYRUH9QHa03uMFGH44g1U_4MTfZXMsEfVvd6Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    supabaseClient.auth.getSessionFromUrl({ storeSession: true })
      .then(({ data, error }) => {
        if (error) {
          document.body.innerHTML = "❌ Erreur : " + error.message;
          console.error(error);
          return;
        }
        const session = data.session;
        if (session) {
          const url = new URL("http://localhost:8501/");
          url.searchParams.set("access_token", session.access_token);
          url.searchParams.set("refresh_token", session.refresh_token);
          window.location.href = url.toString();
        } else {
          document.body.innerHTML = "❌ Aucun token trouvé.";
        }
      });
  </script>
</body>
</html>
